services:
  db:
    image: postgres:17-alpine
    container_name: music-community-db
    env_file:
      - apps/api/.env
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - music-community-network

volumes:
  db_data:

networks:
  music-community-network:
    driver: bridge
